<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Профиль гонщика | NFS Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="utils.js"></script>

  <style>
    :root {
      --nfs-yellow: #f1c40f;
      --nfs-dark: rgba(15, 15, 15, 0.98);
      --nfs-border: #333;
      --nfs-bg: url('https://images7.alphacoders.com/517/thumb-1920-517466.jpg');
    }

    body {
      margin: 0; padding: 0;
      background: var(--nfs-bg) no-repeat center center fixed;
      background-size: cover;
      color: #fff; font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ШАПКА В ПОЛОСКУ */
    .top-navbar {
      height: 70px; position: fixed; top: 0; width: 100%; z-index: 1100;
      display: flex; justify-content: space-between; align-items: center; padding: 0 40px; box-sizing: border-box;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
      repeating-linear-gradient(-45deg, #0a0a0a, #0a0a0a 40px, rgba(241, 196, 15, 0.4) 40px, rgba(241, 196, 15, 0.4) 80px);
      border-bottom: 2px solid var(--nfs-yellow); box-shadow: 0 5px 15px rgba(0,0,0,0.7);
    }

    .title-container { font-size: 1.5rem; font-weight: 900; font-style: italic; text-transform: uppercase; text-shadow: 2px 2px 5px #000; }
    .sidebar { width: 280px; background: var(--nfs-dark); height: calc(100vh - 70px); position: fixed; top: 70px; border-right: 2px solid #333; z-index: 100; }
    .nav-item { display: block; padding: 20px 30px; color: #bbb; text-decoration: none; text-transform: uppercase; transition: 0.3s; }
    .nav-item:hover, .nav-item.active { color: #fff; background: rgba(241, 196, 15, 0.1); border-left: 5px solid var(--nfs-yellow); }

    /* БЕЙДЖ СООБЩЕНИЙ */
    #msgBadge {
      background: var(--nfs-yellow); color: #000; padding: 2px 6px;
      font-size: 0.7rem; font-weight: 900; border-radius: 2px;
      margin-left: 8px; box-shadow: 0 0 10px rgba(241, 196, 15, 0.4);
      display: none;
    }

    .container { margin-left: 280px; padding: 110px 40px 40px 40px; }
    .profile-card { background: rgba(0,0,0,0.85); padding: 40px; border-left: 5px solid var(--nfs-yellow); display: flex; gap: 40px; align-items: flex-start; margin-bottom: 50px; position: relative; box-shadow: 10px 10px 0px rgba(0,0,0,0.5); }

    .avatar-area { text-align: center; }
    .avatar-big { width: 180px; height: 180px; background: #111; border: 3px solid var(--nfs-yellow); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .avatar-big img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-letter { font-size: 4rem; font-weight: 900; color: var(--nfs-yellow); }

    select { background: #111; color: #fff; border: 1px solid var(--nfs-yellow); padding: 12px 18px; font-size: 1.1rem; font-weight: bold; cursor: pointer; outline: none; margin-top: 15px; width: 100%; text-transform: uppercase; }
    .info-area h1 { margin: 0; font-size: 2.5rem; text-transform: uppercase; display: flex; align-items: center; }
    .clan-tag { color: var(--nfs-yellow); margin-right: 15px; }

    .status-badge { display: inline-block; padding: 5px 15px; background: #222; font-size: 0.8rem; font-weight: bold; margin: 15px 0; text-transform: uppercase; letter-spacing: 1px; }
    .status-online { color: #2ecc71; border: 1px solid #2ecc71; }
    .status-ingame { color: var(--nfs-yellow); border: 1px solid var(--nfs-yellow); }
    .status-offline { color: #888; border: 1px solid #444; background: #111; }

    .stat-line { font-size: 1.2rem; color: #ccc; margin: 10px 0; }
    .highlight { color: var(--nfs-yellow); font-weight: bold; }
    .btn-tuning { position: absolute; top: 30px; right: 30px; background: none; border: 1px solid var(--nfs-yellow); color: var(--nfs-yellow); padding: 8px 20px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.3s; font-size: 0.75rem; }
    .btn-tuning:hover { background: var(--nfs-yellow); color: #000; }
    .btn-nfs { background: var(--nfs-yellow); color: #000; border: none; margin-top: 10px; font-size: 0.8rem; padding: 10px 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; display: block; width: 100%; transition: 0.2s; }
    .btn-nfs:hover:not(:disabled) { background: #fff; transform: scale(1.05); }

    .gallery-title { font-size: 1.5rem; font-weight: 900; padding-left: 10px; border-left: 4px solid var(--nfs-yellow); text-transform: uppercase; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
    .car-card {
      background: #0a0a0a;
      border: 1px solid #333;
      padding: 5px;
      position: relative;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      cursor: zoom-in; /* Курсор лупы */
      overflow: hidden;
    }

    /* ТОТ САМЫЙ ЭФФЕКТ НАВЕДЕНИЯ */
    .car-card:hover {
      border-color: var(--nfs-yellow);
      transform: scale(1.05) translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.8), 0 0 15px rgba(241, 196, 15, 0.3);
      z-index: 10;
    }
    .car-card img { width: 100%; height: 180px; object-fit: cover; transition: 0.3s; }
    .car-card:hover img { filter: brightness(1.1); }
    .car-card img { width: 100%; height: 180px; object-fit: cover; }

    .admin-glow { color: #ff4d4d !important; text-shadow: 0 0 10px #ff0000; }
    .vip-glow { color: #f1c40f !important; text-shadow: 0 0 8px #f1c40f; }
    .badge { font-size: 0.9rem; padding: 2px 6px; border-radius: 3px; margin-right: 8px; font-weight: bold; }
    .badge-admin { background: #ff4d4d; color: white; border: 2px solid #da0000; }
    .badge-vip { background: var(--nfs-yellow); color: black; border: 2px solid #000; }

    .bottom-bar {
      position: fixed; bottom: 0; width: 100%; height: 40px;
      background: rgba(0,0,0,0.95); border-top: 2px solid var(--nfs-yellow);
      display: flex; align-items: center; justify-content: center;
      z-index: 1100; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
    }

    .hidden { display: none !important; }
    .swal-avatar-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .swal-avatar-item { width: 60px; height: 60px; cursor: pointer; border: 2px solid transparent; }
    .swal-avatar-item.selected { border-color: var(--nfs-yellow); transform: scale(1.1); }
  </style>
</head>
<body>

<header class="top-navbar">
  <div style="display: flex; align-items: center; gap: 15px;">
    <img src="https://i.ibb.co/DfKw5Ywp/IMG-3707.png"
         alt="NFS Logo"
         style="height: 65px; width: auto; filter: drop-shadow(2px 2px 5px #000);">

    <div style="font-size: 1.6rem; font-weight: 900; letter-spacing: 2px; text-shadow: 2px 2px 5px #000; font-style: italic; text-transform: uppercase;">
      PLAYER PROFILE
    </div>
  </div>

  <div style="display: flex; align-items: center; gap: 15px;">
    <span id="myNickTop" style="font-weight: bold; color: var(--nfs-yellow); text-shadow: 2px 2px 4px #000;">ЗАГРУЗКА...</span>
    <button onclick="handleLogout()" style="background:rgba(0,0,0,0.6); border:1px solid #ff4444; color:#ff4444; cursor:pointer; font-size:0.7rem; padding:4px 10px; font-weight: bold;">EXIT</button>
  </div>
</header>

<aside class="sidebar">
  <nav style="padding-top: 20px;">
    <a href="index.html" class="nav-item">Главная</a>
    <a href="forum.html" class="nav-item">Форум</a>
    <a href="chats.html" class="nav-item">МЕССЕНДЖЕР <span id="msgBadge">0</span></a>
    <a href="lobby.html" class="nav-item">ПОИСК ИГРЫ</a>
    <a href="leaderboard.html" class="nav-item">ЛИДЕРЫ</a>
    <a href="profile.html" class="nav-item active">Мой Профиль</a>
  </nav>
</aside>

<div class="container">
  <div class="profile-card">
    <button id="editBtn" class="btn-tuning hidden" onclick="openEditProfile()">Редактировать профиль</button>
    <div class="avatar-area">
      <div class="avatar-big" id="avatarBox"><span class="avatar-letter">?</span></div>
      <select id="statusSelect" class="hidden" onchange="updateUserStatus()">
        <option value="ONLINE">В СЕТИ</option>
        <option value="IN GAME">В ИГРЕ</option>
        <option value="LOOKING FOR GAME">ИЩУ ИГРУ</option>
        <option value="OFFLINE">ОФЛАЙН</option>
      </select>
      <button id="msgBtn" class="btn-nfs hidden" onclick="goToChat()">✉ НАПИСАТЬ</button>
      <button id="friendBtn" class="btn-nfs hidden">ДОБАВИТЬ В ДРУЗЬЯ</button>
    </div>
    <div class="info-area">
      <h1><span id="badgeContainer"></span><span class="clan-tag" id="profClan">[...]</span><span id="profName">Loading...</span></h1>
      <p id="profBio" style="color: #aaa; font-style: italic; margin: 10px 0; font-size: 1.1rem;">Загрузка данных...</p>
      <div id="statusIndicator" class="status-badge status-online">OFFLINE</div>
      <div class="stat-line">Рейтинг: <span class="highlight" id="profRating">★ 0</span></div>
      <div class="stat-line">Место в Лидерах: <span class="highlight" id="rankDisplay">#--</span></div>
    </div>
  </div>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <div class="gallery-title" id="garageTitle">ГАРАЖ ГОНЩИКА</div>
    <button id="addCarBtn" class="btn-tuning hidden" style="position: static;" onclick="addNewCarPhoto()">+ ДОБАВИТЬ АВТО</button>
  </div>
  <div class="gallery" id="garageContainer"></div>
</div>

<footer class="bottom-bar">
  <div>ONLINE: <span class="highlight" id="footerOnline">0</span> | В ЗАЕЗДЕ: <span class="highlight" id="footerPlaying">0</span></div>
</footer>

  <script>
    const SUPABASE_URL = 'https://obeavooabtzadlcmybel.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_qLmZZzwjyqF6ZO8BCoKj2A_a9oHPA2z';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    if (typeof onlineUsers === 'undefined') window.onlineUsers = {};

    // Константы
    const AVATAR_OPTIONS = [
    'https://cs9.pikabu.ru/post_img/2017/02/16/9/1487255861137287071.png',
    'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSEveKMVakzm3H74-BgFH8JGuoTkavsfgIAaw&s',
    'https://static.wikia.nocookie.net/needforspeed/images/e/ee/TazProfileIcon.png/revision/latest/scale-to-width-down/220?cb=20160105211008&path-prefix=ru',
    'https://static.wikia.nocookie.net/nfs/images/6/6f/Sonny.png/revision/latest/smart/width/250/height/250?cb=20150519180637&path-prefix=es'
    ];

    let currentUserId = null, myProfile = null, profileData = null;

    window.onload = async () => {
    // 1. Проверка авторизации
    const { data: { user } } = await _supabase.auth.getUser();
    if (!user) { window.location.href = 'auth.html'; return; }
    currentUserId = user.id;

    // 2. Загрузка личных данных (для шапки и статуса)
    const { data: me } = await _supabase.from('profiles').select('*').eq('id', currentUserId).single();
    if (me) {
    myProfile = me;
    const nickEl = document.getElementById('myNickTop');
    if (nickEl) nickEl.innerText = me.username;

    // Запускаем глобальный маяк из utils.js
    if (typeof initGlobalStatus === 'function') {
    initGlobalStatus(_supabase, me);
  }

    if (typeof updateGlobalMsgBadge === 'function') {
    updateGlobalMsgBadge(_supabase, me.id);
  }
  }

    // 3. Логика отображения профиля
    const urlParams = new URLSearchParams(window.location.search);
    const targetName = urlParams.get('u');

    if (targetName) {
    const { data } = await _supabase.from('profiles').select('*').ilike('username', targetName).maybeSingle();
    if (data) {
    profileData = data;
    renderFullProfile(data, data.id === currentUserId);
    updateRacerRank(data.id);
    if (data.id !== currentUserId) checkFriendshipStatus(data.id);
  } else {
    loadMyOwnProfile(user.id);
  }
  } else {
    loadMyOwnProfile(user.id);
  }
  };

    window.updateLiveStatusUI = function() {
      const el = document.getElementById('statusIndicator');
      if (!el || !profileData) return;

      // 1. Проверяем, видит ли радар этого пользователя в сети
      const presence = (typeof onlineUsers !== 'undefined') ? onlineUsers[profileData.username] : null;

      // 2. Если это твой профиль — ты точно в сети, даже если радар тупит
      const isItMe = (myProfile && profileData.id === myProfile.id);

      if (!presence && !isItMe) {
        // Юзер реально оффлайн
        el.innerText = 'OFFLINE';
        el.className = 'status-badge status-offline';
      } else {
        // Юзер ОНЛАЙН — теперь выбираем, какой именно статус показать
        const s = profileData.status || 'ONLINE';
        const loc = presence ? presence[0].location : '';

        // Приоритет 1: Если юзер в мессенджере
        if (loc === 'chats.html') {
          el.innerText = 'В ЧАТЕ';
          el.className = 'status-badge status-ingame';
        }
        // Приоритет 2: Тот статус, который ты выбрала в списке (В ИГРЕ / ИЩУ ИГРУ)
        else {
          el.innerText = s;
          // Если статус боевой (игра/поиск), красим в желтый, если просто онлайн — в зеленый
          if (s === 'IN GAME' || s === 'LOOKING FOR GAME') {
            el.className = 'status-badge status-ingame';
          } else {
            el.className = 'status-badge status-online';
          }
        }
      }
    };

    async function loadMyOwnProfile(userId) {
      try {
        const { data, error } = await _supabase.from('profiles').select('*').eq('id', userId).single();
        if (error) throw error;
        if (data) {
          profileData = data;
          renderFullProfile(data, true);
          updateRacerRank(data.id);
        }
      } catch (err) {
        console.error("Ошибка загрузки своего профиля:", err);
        // Если даже база упала, хоть имя покажем из кеша авторизации
        document.getElementById('profName').innerText = "ОШИБКА СВЯЗИ";
      }
    }

    async function updateRacerRank(targetUserId) {
    const { data: racers } = await _supabase.from('profiles').select('id').order('rating', { ascending: false });
    if (racers) {
    const rank = racers.findIndex(r => r.id === targetUserId) + 1;
    const rankEl = document.getElementById('rankDisplay');
    if (rankEl) rankEl.innerText = `#${rank}`;
  }
  }

    function renderFullProfile(data, isMine) {
      // 1. Очищаем надпись "ЗАГРУЗКА..." в шапке (если она еще там висит)
      const topNick = document.getElementById('myNickTop');
      if (topNick && myProfile) topNick.innerText = myProfile.username;

      const nameEl = document.getElementById('profName');
      const badgeEl = document.getElementById('badgeContainer');

      if (nameEl) {
        nameEl.innerText = data.username;
        if (data.is_admin) {
          nameEl.classList.add('admin-glow');
          badgeEl.innerHTML = `<span class="badge badge-admin">ADM</span>`;
        } else if (data.is_vip) {
          nameEl.classList.add('vip-glow');
          badgeEl.innerHTML = `<span class="badge badge-vip">VIP</span>`;
        }
      }

      // 2. Убираем "Загрузка данных..." из БИО
      document.getElementById('profBio').innerText = data.bio || "Элитный гонщик Рокпорта";
      document.getElementById('profRating').innerText = `★ ${data.rating.toLocaleString()}`;

      const box = document.getElementById('avatarBox');
      if (box) box.innerHTML = data.avatar_url ? `<img src="${data.avatar_url}">` : `<span class="avatar-letter">${data.username[0].toUpperCase()}</span>`;

      const clanEl = document.getElementById('profClan');
      if (clanEl) clanEl.innerText = data.clan_tag || '[НЕТ]';

      renderGarage(data.photos);

      // Вызываем обновление статуса (ONLINE/OFFLINE/В ЧАТЕ)
      if (typeof window.updateLiveStatusUI === 'function') {
        window.updateLiveStatusUI();
      }

      if (isMine) {
        document.getElementById('editBtn').classList.remove('hidden');
        document.getElementById('statusSelect').classList.remove('hidden');
        document.getElementById('addCarBtn').classList.remove('hidden');
        document.getElementById('statusSelect').value = data.status || 'ONLINE';
      } else {
        document.getElementById('msgBtn').classList.remove('hidden');
        document.getElementById('friendBtn').classList.remove('hidden');
      }
    }

    function renderGarage(photos) {
    const container = document.getElementById('garageContainer');
    if (!container) return;
    container.innerHTML = photos?.length ? '' : '<p style="color:#555">Пусто...</p>';
    photos?.forEach((url, i) => {
    container.innerHTML += `
        <div class="car-card" onclick="viewFullImage('${url}')">
          <img src="${url}">
          <div style="padding:10px; display:flex; justify-content:space-between; background:rgba(0,0,0,0.8);">
            <span style="color:var(--nfs-yellow); font-size:0.8rem; font-weight:bold;">PHOTO #${i+1}</span>
            <button class="btn-tuning" style="position:static; padding:2px 10px;" onclick="event.stopPropagation(); nfsNotify('RESPECT!')">LIKE</button>
          </div>
        </div>`;
  });
  }

    function viewFullImage(url) {
    Swal.fire({
      imageUrl: url,
      background: 'rgba(0,0,0,0.9)',
      showConfirmButton: false,
      showCloseButton: true,
      width: 'auto'
    });
  }

    async function addNewCarPhoto() {
    const { value: url } = await Swal.fire({
    title: 'ТЮНИНГ ГАРАЖА',
    background: '#0a0a0a',
    color: '#fff',
    input: 'url',
    inputPlaceholder: 'Вставь прямую ссылку на фото (.jpg, .png)',
    confirmButtonText: 'ДОБАВИТЬ',
    confirmButtonColor: '#f1c40f'
  });

    if (url) {
    const photos = [...(profileData.photos || []), url];
    const { error } = await _supabase.from('profiles').update({ photos }).eq('id', currentUserId);
    if (!error) location.reload();
  }
  }

    async function updateUserStatus() {
      const s = document.getElementById('statusSelect').value;

      // 1. Обновляем таблицу
      await _supabase.from('profiles').update({ status: s }).eq('id', currentUserId);

      // 2. Обновляем активный трекинг в радаре (чтобы друзья увидели сразу)
      if (typeof window.trackMyStatus === 'function') {
        await window.trackMyStatus(s);
      }

      // 3. Обновляем локальные данные, чтобы UI перерисовался без лагов
      profileData.status = s;
      window.updateLiveStatusUI();

      nfsNotify('Статус изменен: ' + s);
    }

    async function openEditProfile() {
    let avatarHtml = '<div class="swal-avatar-list">';
    AVATAR_OPTIONS.forEach(url => {
    avatarHtml += `<img src="${url}" class="swal-avatar-item ${profileData.avatar_url === url ? 'selected' : ''}" onclick="selectSwalAvatar(this, '${url}')">`;
  });
    avatarHtml += '</div>';

    const { value: formValues } = await Swal.fire({
    title: 'ТЮНИНГ ПРОФИЛЯ',
    background: '#0a0a0a', color: '#fff',
    html: `<p style="font-size:0.8rem;">ИКОНКА:</p>${avatarHtml}<p style="margin-top:15px; font-size:0.8rem;">BIO:</p><input id="swal-bio" class="swal2-input" value="${profileData.bio || ''}" style="background:#111; color:#fff; width:80%;">`,
    confirmButtonText: 'СОХРАНИТЬ',
    preConfirm: () => ({
    bio: document.getElementById('swal-bio').value,
    avatar: document.querySelector('.swal-avatar-item.selected')?.src || profileData.avatar_url
  })
  });

    if (formValues) {
    await _supabase.from('profiles').update({ bio: formValues.bio, avatar_url: formValues.avatar }).eq('id', currentUserId);
    location.reload();
  }
  }

    function selectSwalAvatar(el, url) {
    document.querySelectorAll('.swal-avatar-item').forEach(img => img.classList.remove('selected'));
    el.classList.add('selected');
  }

    async function checkFriendshipStatus(targetUserId) {
      const {data: request} = await _supabase.from('friend_requests').select('*').or(`and(sender_id.eq.${myProfile.id},receiver_id.eq.${targetUserId}),and(sender_id.eq.${targetUserId},receiver_id.eq.${myProfile.id})`).maybeSingle();
      const btn = document.getElementById('friendBtn');
      if (!btn) return;
      btn.classList.remove('hidden');
      if (!request) {
        btn.innerText = "ДОБАВИТЬ В ДРУЗЬЯ";
        btn.onclick = () => sendFriendRequest(targetUserId);
      } else if (request.status === 'pending') {
        if (request.sender_id === myProfile.id) {
          btn.innerText = "ЗАПРОС ОТПРАВЛЕН";
          btn.disabled = true;
        } else {
          btn.innerText = "ПРИНЯТЬ ЗАПРОС";
          btn.onclick = () => acceptFriendRequest(request.id);
        }
      } else if (request.status === 'accepted') {
        btn.innerText = "УДАЛИТЬ ИЗ ДРУЗЕЙ";
        // Применяем стиль опасности
        btn.style.background = "#e74c3c"; // Насыщенный красный
        btn.style.color = "#fff";
        btn.style.border = "2px solid #c0392b";
        btn.style.boxShadow = "0 0 10px rgba(231, 76, 60, 0.4)";

        btn.onclick = () => removeFriend(request.id);
      }
    }

    async function sendFriendRequest(targetId) { await _supabase.from('friend_requests').insert([{ sender_id: myProfile.id, receiver_id: targetId, sender_name: myProfile.username }]); location.reload(); }
    async function acceptFriendRequest(requestId) { await _supabase.from('friend_requests').update({ status: 'accepted' }).eq('id', requestId); location.reload(); }
    async function removeFriend(requestId) { await _supabase.from('friend_requests').delete().eq('id', requestId); location.reload(); }

    function goToChat() { window.location.href = `chats.html?to=${profileData.username}`; }

    async function handleLogout() {
    if (currentUserId) await _supabase.from('profiles').update({ status: 'OFFLINE' }).eq('id', currentUserId);
    await _supabase.auth.signOut();
    window.location.href = 'auth.html';
  }
</script>
